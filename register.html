<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - MentorGG AI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo"><a href="index.html">MentorGG <span>AI</span></a></div>
        <div class="nav-links">
            <a href="index.html">Beranda</a>
            <a href="login.html" class="btn-login">Login</a>
        </div>
    </nav>

    <!-- REGISTER SECTION -->
    <section class="auth-section">
        <div class="auth-card">
            <h2>Buat Akun <span>Gratis</span></h2>
            <p class="auth-sub">Bergabung dengan MentorGG AI sekarang</p>

            <div class="auth-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Username kamu">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="contoh@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Minimal 6 karakter">
                </div>
                <div class="form-group">
                    <label>Konfirmasi Password</label>
                    <input type="password" id="confirm-password" placeholder="Ulangi password">
                </div>
                <button class="btn-submit" onclick="handleRegister()">Daftar Sekarang</button>
                <p class="auth-switch">Sudah punya akun? <a href="login.html">Login</a></p>
            </div>
        </div>
    </section>

    <script src="js/auth.js"></script>
</body>
</html>
