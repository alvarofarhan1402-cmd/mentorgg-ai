<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MentorGG AI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo"><a href="index.html">MentorGG <span>AI</span></a></div>
        <div class="nav-links">
            <a href="index.html">Beranda</a>
            <a href="register.html" class="btn-register">Daftar Gratis</a>
        </div>
    </nav>

    <!-- LOGIN SECTION -->
    <section class="auth-section">
        <div class="auth-card">
            <h2>Selamat Datang <span>Kembali</span></h2>
            <p class="auth-sub">Masuk ke akun MentorGG AI kamu</p>

            <div class="auth-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="contoh@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Masukkan password">
                </div>
                <button class="btn-submit" onclick="handleLogin()">Masuk</button>
                <p class="auth-switch">Belum punya akun? <a href="register.html">Daftar Gratis</a></p>
            </div>
        </div>
    </section>

    <script src="js/auth.js"></script>
</body>
</html>
